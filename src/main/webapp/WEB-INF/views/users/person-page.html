<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Edit User</title>
</head>
<body>
<div class="container">
    <h2>Изменить данные пользователя:</h2>

    <form th:action="@{/user/update}" method="post" th:object="${user}">
        <input type="hidden" th:field="*{id}" />

        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" th:field="*{name}" id="name" required />
        </div>

        <div class="form-group">
            <label for="surname">Surname</label>
            <input type="text" th:field="*{surname}" id="surname" required />
        </div>

        <button type="submit" class="btn btn-success">Сохранить изменения</button>
        <a th:href="@{/users-page}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
</body>
</html>
